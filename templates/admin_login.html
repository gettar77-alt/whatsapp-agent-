<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إدارة View Apartment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f0f2f5;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 340px;
      text-align: center;
    }
    .logo { font-size: 36px; margin-bottom: 8px; }
    h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 4px; }
    p  { font-size: 13px; color: #888; margin-bottom: 28px; }
    input[type=password] {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 16px; font-family: inherit;
      outline: none; margin-bottom: 14px;
      transition: border 0.2s;
      text-align: center; letter-spacing: 4px;
    }
    input[type=password]:focus { border-color: #075e54; }
    button {
      width: 100%; padding: 13px;
      background: #075e54; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-family: inherit;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #128c7e; }
    .error {
      background: #fff0f0; color: #c0392b;
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h1>لوحة الإدارة</h1>
  <p>View Apartment</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="كلمة السر" autofocus/>
    <button type="submit">دخول</button>
  </form>
</div>
</body>
</html>
